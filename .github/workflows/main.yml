name: Build and Deploy .NET 8 App to Azure Web App

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches:
      - Dev            # Optional: keep if you also want auto trigger

env:
  BUILD_CONFIGURATION: Release
  AZURE_WEBAPP_NAME: myapi-app-ramu

jobs:

# ================= BUILD JOB =================
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Packages
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration $BUILD_CONFIGURATION

    - name: Publish Project
      run: dotnet publish --configuration $BUILD_CONFIGURATION --output ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: drop
        path: ./publish
